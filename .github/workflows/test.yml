name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./cmd/logdiet
      - run: go test ./internal/bench
      - run: go test ./internal/cli
      - run: go test ./internal/compact
      - run: go test ./internal/instructions
      - run: go test ./internal/run
      - run: go test ./internal/shim
      - run: go test ./internal/store
      - run: go test ./internal/textutil
      - run: go test ./internal/version
