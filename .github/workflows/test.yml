name: test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: |
          set +e
          go test ./... > gotest.txt 2>&1
          status=$?
          cat gotest.txt
          if [ "$status" -ne 0 ]; then
            tail -n 80 gotest.txt | sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g; s/^/::error file=.github\/workflows\/test.yml::/'
          fi
          exit "$status"
